services:
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: bet-project-php
    volumes:
      - ./app:/var/www/html
    networks:
      - app
    depends_on:
      postgres:
        condition: service_healthy

  php-cli:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: bet-project-php-cli
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - ./app:/var/www/html
    networks:
      - app
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: bet-project-nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app
    depends_on:
      - php

  postgres:
    image: postgres:16-alpine
    container_name: bet-project-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-bet_project}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-bet_project}"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:16-alpine
    container_name: bet-project-postgres-test
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB_TEST:-bet_project_test}
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB_TEST:-bet_project_test}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
  postgres_test_data:
