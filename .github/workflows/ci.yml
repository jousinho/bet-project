name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: PHPUnit (PHP 8.4 + PostgreSQL 16)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: bet_project_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, intl, bcmath, zip
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: app/vendor
          key: composer-${{ hashFiles('app/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        working-directory: app
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run migrations
        working-directory: app
        env:
          DATABASE_URL: postgresql://app:secret@localhost:5432/bet_project_test?serverVersion=16&charset=utf8
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Run tests
        working-directory: app
        env:
          DATABASE_URL: postgresql://app:secret@localhost:5432/bet_project_test?serverVersion=16&charset=utf8
          FOOTBALL_DATA_API_KEY: dummy_ci_key
        run: php bin/phpunit --testdox
